{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: {{ include "employee-api.fullname" . }}-pvc

  labels:
    {{- include "employee-api.labels" . | nindent 4 }}

spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}

  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}